name: build-and-test

on:
    workflow_dispatch:
    pull_request:
        branches:
            - main

jobs:
    build-and-test-linux:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive
            
            - name: Build the project
              run: |
                echo "Building the parser"
                mkdir -p build
                cd build
                cmake -DBNFC=OFF ..
                make -j$(nproc)
                echo "Build completed successfully"

            - name: Test VNNLib files
              run: |
                echo "Testing VNNLib files"
                cd build
                for file in ../grammar/syntax/test/*.vnnlib; do
                  echo "Testing $file"
                  ../bin/VNNLibParser check "$file"
                done
                echo "All tests passed"

    build-and-test-windows:
        runs-on: windows-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive
            
            - name: Configure CMake
              run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBNFC=OFF

            - name: Build
              run: cmake --build build --config Release

            - name: Test VNNLib files
              run: |
                cd build
                foreach ($file in Get-ChildItem ../grammar/syntax/test/*.vnnlib) {
                  Write-Host "Testing $file"
                  ../bin/Release/VNNLibParser.exe check $file.FullName
                }
                Write-Host "All tests passed"

    build-and-test-macos:
        runs-on: macos-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive
            
            - name: Configure CMake
              run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBNFC=OFF

            - name: Build
              run: cmake --build build --config Release

            - name: Test VNNLib files
              run: |
                cd build
                for file in ../grammar/syntax/test/*.vnnlib; do
                  echo "Testing $file"
                  ../bin/VNNLibParser check "$file"
                done
                echo "All tests passed"

    build-and-test-from-grammar:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive
            
            - name: Cache Haskell dependencies
              uses: actions/cache@v3
              with:
                path: ~/.cabal
                key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal') }}
                restore-keys: |
                  ${{ runner.os }}-cabal-
            
            - name: Install dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y cabal-install ghc
            
            - name: Install Haskell dependencies
              run: |
                cabal update
                cabal install alex happy BNFC
                echo "$HOME/.cabal/bin" >> $GITHUB_PATH

            - name: Build the project
              run: |
                echo "Building the parser"
                mkdir -p build
                cd build
                cmake -DBNFC=ON ..
                make -j$(nproc)
                echo "Build completed successfully"

            - name: Test VNNLib files
              run: |
                echo "Testing VNNLib files"
                cd build
                for file in ../grammar/syntax/test/*.vnnlib; do
                  echo "Testing $file"
                  ../bin/VNNLibParser check "$file"
                done
                echo "All tests passed"