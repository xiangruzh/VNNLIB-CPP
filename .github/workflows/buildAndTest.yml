name: build-and-test

on:
    workflow_dispatch:
    pull_request:
        branches:
            - main

jobs:
    build-and-test-linux:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive
            
            - name: Build the project
              run: |
                echo "Building the parser"
                mkdir -p build
                cd build
                cmake -DBNFC=OFF ..
                make -j$(nproc)
                echo "Build completed successfully"

            - name: Test VNNLib files
              run: |
                echo "Testing VNNLib files"
                cd build
                for file in ../grammar/test/*.vnnlib; do
                  echo "Testing $file"
                  ../bin/VNNLibParser check "$file"
                done
                echo "All tests passed"

    build-windows-mingw:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive

            - name: Install MinGW-w64
              run: |
                sudo apt-get update
                sudo apt-get install -y mingw-w64

            - name: Configure CMake (Windows / MinGW)
              run: |
                cmake -S . -B build-windows \
                -DCMAKE_SYSTEM_NAME=Windows \
                -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
                -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
                -DCMAKE_BUILD_TYPE=Release \
                -DBNFC=OFF

            - name: Build Windows binaries
              run: |
                cmake --build build-windows -j$(nproc)

            - name: Upload Windows artifacts
              uses: actions/upload-artifact@v4
              with:
                name: windows-mingw-build
                path: |
                  bin/*

    test-windows:
        runs-on: windows-latest
        needs: build-windows-mingw
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive

            - name: Download Windows artifacts
              uses: actions/download-artifact@v4
              with:
                name: windows-mingw-build
                path: windows-bin       # download all artifacts into this folder

            - name: Add DLLs to PATH
              run: |
                echo "${{ github.workspace }}\windows-bin" >> $env:GITHUB_PATH

            - name: Test VNNLib files (Windows)
              run: |
                Get-ChildItem windows-bin
                $exe = Join-Path $PWD "windows-bin\VNNLibParser.exe"

                foreach ($file in Get-ChildItem grammar\test\*.vnnlib) {
                    Write-Host "Testing $file"
                    & $exe check -v $file.FullName
                    Write-Host "Exit code: $LASTEXITCODE"
                }

    build-and-test-macos:
        runs-on: macos-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive
            
            - name: Configure CMake
              run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBNFC=OFF

            - name: Build
              run: cmake --build build --config Release

            - name: Test VNNLib files
              run: |
                cd build
                for file in ../grammar/test/*.vnnlib; do
                  echo "Testing $file"
                  ../bin/VNNLibParser check "$file"
                done
                echo "All tests passed"

    build-and-test-from-grammar:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                submodules: recursive
            
            - name: Cache Haskell dependencies
              uses: actions/cache@v3
              with:
                path: ~/.cabal
                key: ${{ runner.os }}-cabal-${{ hashFiles('**/*.cabal') }}
                restore-keys: |
                  ${{ runner.os }}-cabal-
            
            - name: Install dependencies
              run: |
                sudo apt-get update
                sudo apt-get install -y cabal-install ghc
            
            - name: Install Haskell dependencies
              run: |
                cabal update
                cabal install alex happy BNFC
                echo "$HOME/.cabal/bin" >> $GITHUB_PATH

            - name: Build the project
              run: |
                echo "Building the parser"
                mkdir -p build
                cd build
                cmake -DBNFC=ON ..
                make -j$(nproc)
                echo "Build completed successfully"

            - name: Test VNNLib files
              run: |
                echo "Testing VNNLib files"
                cd build
                for file in ../grammar/test/*.vnnlib; do
                  echo "Testing $file"
                  ../bin/VNNLibParser check "$file"
                done
                echo "All tests passed"